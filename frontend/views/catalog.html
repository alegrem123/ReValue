<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalogo — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"

    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"

    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQvO1Qbzt1z3VgOcYFhH4p+R1M1pR1Y="
    crossorigin=""
  />
  <style>
    :root {
      --rv-green:       #2E7D32;
      --rv-green-light: #43A047;
      --rv-green-dark:  #1B5E20;
      --rv-accent:      #FFC107;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #f8f9fa;
    }

    .catalog-hero {
      background-color: #2E7D32;
      color: #fff;
    }

    .catalog-hero h1 {
      letter-spacing: -0.03em;
    }

    .card-img-top {
      object-fit: cover;
    }

    .catalog-map {
      min-height: 360px;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .filter-panel {
      border-left: 4px solid var(--rv-green);
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5" id="catalog-container">
    <section class="catalog-hero rounded-4 p-4 mb-4 shadow-sm">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-start">
        <div>
          <p class="text-uppercase small text-warning mb-2">Catalogo pubblico</p>
          <h1 class="display-6 fw-bold mb-2">Trova l'oggetto che fa per te</h1>
          <p class="mb-0 opacity-85">
            Sfoglia gli annunci disponibili e scopri subito nuovi oggetti da scambiare nella tua città.
          </p>
        </div>
        <div class="text-md-end">
          <a href="/index.html" class="btn btn-outline-light btn-sm">Torna alla home</a>
        </div>
      </div>
    </section>

    <div id="catalog-alert" class="alert d-none" role="alert"></div>

    <section class="bg-white rounded-4 p-4 shadow-sm mb-4 filter-panel">
      <form id="catalog-filters" class="row g-3 align-items-end">
        <div class="col-md-6 col-lg-3">
          <label for="filter-category" class="form-label">Categoria</label>
          <input id="filter-category" name="categoria" type="text" class="form-control" placeholder="Es. Mobili" />
        </div>
        <div class="col-md-6 col-lg-2">
          <label for="filter-size" class="form-label">Dimensione</label>
          <select id="filter-size" name="dimensione" class="form-select">
            <option value="">Tutte</option>
            <option value="piccolo">Piccolo</option>
            <option value="medio">Medio</option>
            <option value="grande">Grande</option>
            <option value="molto grande">Molto grande</option>
          </select>
        </div>
        <div class="col-md-6 col-lg-2">
          <label for="filter-material" class="form-label">Materiale</label>
          <input id="filter-material" name="materiale" type="text" class="form-control" placeholder="Es. Legno" />
        </div>
        <div class="col-md-6 col-lg-2">
          <label for="filter-distance" class="form-label">Distanza</label>
          <select id="filter-distance" name="raggio" class="form-select">
            <option value="">Qualsiasi</option>
            <option value="2">Entro 2 km</option>
            <option value="5">Entro 5 km</option>
            <option value="10">Entro 10 km</option>
            <option value="25">Entro 25 km</option>
          </select>
        </div>
        <div class="col-md-6 col-lg-3">
          <label for="filter-deadline" class="form-label">Scadenza entro</label>
          <input id="filter-deadline" name="scadenzaPrima" type="date" class="form-control" />
        </div>
        <div class="col-12 d-flex flex-column flex-md-row gap-2 justify-content-between">
          <button id="use-position-btn" type="button" class="btn btn-outline-success">
            <i class="bi bi-geo-alt"></i>
            Usa posizione
          </button>
          <div class="d-flex gap-2">
            <button type="reset" class="btn btn-outline-secondary">Pulisci</button>
            <button type="submit" class="btn btn-success">Applica filtri</button>
          </div>
        </div>
      </form>
    </section>

    <section class="bg-white rounded-4 p-4 shadow-sm mb-4">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-2 mb-3">
        <div>
          <h2 class="h5 fw-bold mb-1">Mappa annunci</h2>
          <p id="catalog-map-status" class="text-muted mb-0">Caricamento mappa...</p>
        </div>
      </div>
      <div id="catalog-map" class="catalog-map rounded-3 overflow-hidden"></div>
    </section>

    <div id="catalog-spinner" class="text-center py-5 d-none">
      <div class="spinner-border text-success" role="status"></div>
      <p class="mt-3 mb-0">Caricamento annunci...</p>
    </div>

    <div id="catalog-grid" class="row g-4"></div>
  </main>

  <div id="footer-container"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"

    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="/js/layout.js" defer></script>
  <script src="/js/apiClient.js" defer></script>
  <script src="/js/components/annuncioCard.js" defer></script>
  <script src="/js/map.js" defer></script>
  <script src="/js/catalog.js" defer></script>
</body>
</html>
