<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I miei premi — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
    crossorigin="anonymous"
  />
  <style>
    .code-box {
      font-family: monospace;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      background: #f8f9fa;
      border: 1.5px dashed #adb5bd;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      user-select: all;
      display: inline-block;
    }
    .code-box:hover { background: #e9ecef; }

    /* skeleton shimmer */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skeleton {
      border-radius: 6px;
      background: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 50%, #e9ecef 75%);
      background-size: 600px 100%;
      animation: shimmer 1.2s infinite;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5" style="max-width: 900px;">
    <section class="page-hero mb-4">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-start">
        <div>
          <p class="page-hero-eyebrow">Area personale</p>
          <h1 class="h3 fw-bold mb-2">I miei premi</h1>
          <p class="text-muted mb-0">Coupon riscattati con i tuoi crediti RE-VALUE.</p>
        </div>
        <a href="premi.html" class="btn btn-success">
          <i class="bi bi-gift me-1"></i>Esplora premi
        </a>
      </div>
    </section>

    <div id="miei-premi-alert" class="alert d-none" role="alert"></div>

    <section class="bg-white rounded-4 shadow-sm overflow-hidden">
      <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
        <h2 class="h5 fw-bold mb-0">Riscatti effettuati</h2>
        <button id="refresh-btn" type="button" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-clockwise me-1"></i>Aggiorna
        </button>
      </div>

      <!-- skeleton -->
      <div id="miei-premi-skeleton" class="p-3 d-flex flex-column gap-3">
        <div class="skeleton" style="height:72px;"></div>
        <div class="skeleton" style="height:72px;"></div>
        <div class="skeleton" style="height:72px;"></div>
      </div>

      <!-- empty state -->
      <div id="miei-premi-empty" class="text-center py-5 d-none">
        <i class="bi bi-gift fs-1 text-muted"></i>
        <p class="text-muted mt-3 mb-3">Non hai ancora riscattato nessun premio.</p>
        <a href="premi.html" class="btn btn-success">Scopri i premi disponibili</a>
      </div>

      <!-- list -->
      <div id="miei-premi-list" class="list-group list-group-flush d-none"></div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/myPremi.js" defer></script>
</body>
</html>
