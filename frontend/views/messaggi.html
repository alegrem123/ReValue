<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messaggi — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
    crossorigin="anonymous"
  />
  <style>
.conv-card {
      transition: box-shadow 0.15s ease, background-color 0.15s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .conv-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
      background-color: #f0f7f0 !important;
    }

    .conv-card.unread { border-left: 3px solid var(--rv-green); }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rv-green-light), var(--rv-green-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      flex-shrink: 0;
    }

    .unread-badge {
      background-color: var(--rv-green);
      color: #fff;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .preview-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5">
    <div id="msg-alert" class="alert d-none" role="alert"></div>

    <section class="page-hero">
      <div class="d-flex justify-content-between align-items-start gap-3">
        <div>
          <p class="page-hero-eyebrow">Comunicazioni</p>
          <h1 class="h3 fw-bold mb-0">Messaggi</h1>
        </div>
        <a href="catalog.html" class="btn btn-outline-light btn-sm">
          <i class="bi bi-grid me-1"></i>Catalogo
        </a>
      </div>
    </section>

    <div id="conv-list">
      <div class="text-center py-5">
        <div class="spinner-border text-success" role="status">
          <span class="visually-hidden">Caricamento...</span>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/messaggi.js" defer></script>
</body>
</html>
