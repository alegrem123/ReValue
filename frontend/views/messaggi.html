<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messaggi — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    crossorigin="anonymous"
  />
  <style>
    :root {
      --rv-green:       #2E7D32;
      --rv-green-light: #43A047;
      --rv-green-dark:  #1B5E20;
      --rv-accent:      #FFC107;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #f8f9fa;
    }

    .page-header { border-left: 4px solid var(--rv-green); }

    .conv-card {
      transition: box-shadow 0.15s ease, background-color 0.15s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .conv-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
      background-color: #f0f7f0 !important;
    }

    .conv-card.unread { border-left: 3px solid var(--rv-green); }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rv-green-light), var(--rv-green-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      flex-shrink: 0;
    }

    .unread-badge {
      background-color: var(--rv-green);
      color: #fff;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .preview-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5">
    <div id="msg-alert" class="alert d-none" role="alert"></div>

    <section class="bg-white rounded-4 p-4 shadow-sm mb-4 page-header">
      <div class="d-flex justify-content-between align-items-start gap-3">
        <div>
          <p class="text-uppercase small text-success mb-2">Comunicazioni</p>
          <h1 class="h3 fw-bold mb-0">Messaggi</h1>
        </div>
        <a href="catalog.html" class="btn btn-outline-success btn-sm">
          <i class="bi bi-grid me-1"></i>Catalogo
        </a>
      </div>
    </section>

    <div id="conv-list">
      <div class="text-center py-5">
        <div class="spinner-border text-success" role="status">
          <span class="visually-hidden">Caricamento...</span>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/messaggi.js" defer></script>
</body>
</html>
