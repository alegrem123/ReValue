<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le mie prenotazioni — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
    crossorigin="anonymous"
  />
  <style>
.booking-card {
      transition: box-shadow 0.15s ease;
    }

    .booking-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
    }

    .badge-ATTIVA      { background-color: #2E7D32; }
    .badge-COMPLETATA  { background-color: #1565C0; }
    .badge-ANNULLATA   { background-color: #c62828; }

    .filter-btn.active {
      background-color: var(--rv-green);
      color: #fff;
      border-color: var(--rv-green);
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5">
    <div id="bookings-alert" class="alert d-none" role="alert"></div>

    <section class="page-hero">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-start">
        <div>
          <p class="page-hero-eyebrow">Il mio account</p>
          <h1 class="h3 fw-bold mb-0">Le mie prenotazioni</h1>
        </div>
        <a href="catalog.html" class="btn btn-outline-light btn-sm">
          <i class="bi bi-grid me-1"></i>Esplora catalogo
        </a>
      </div>
    </section>

    <!-- Filtri stato -->
    <div class="d-flex gap-2 flex-wrap mb-4">
      <button class="btn btn-outline-secondary filter-btn active" data-stato="">Tutte</button>
      <button class="btn btn-outline-secondary filter-btn" data-stato="ATTIVA">
        <span class="badge badge-ATTIVA me-1">&nbsp;</span>Attive
      </button>
      <button class="btn btn-outline-secondary filter-btn" data-stato="COMPLETATA">
        <span class="badge badge-COMPLETATA me-1">&nbsp;</span>Completate
      </button>
      <button class="btn btn-outline-secondary filter-btn" data-stato="ANNULLATA">
        <span class="badge badge-ANNULLATA me-1">&nbsp;</span>Annullate
      </button>
    </div>

    <!-- Lista prenotazioni -->
    <div id="bookings-list">
      <div class="text-center py-5">
        <div class="spinner-border text-success" role="status">
          <span class="visually-hidden">Caricamento...</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Modale conferma annullamento -->
  <div class="modal fade" id="modalAnnulla" tabindex="-1" aria-labelledby="modalAnnullaLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold" id="modalAnnullaLabel">Annulla prenotazione</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Chiudi"></button>
        </div>
        <div class="modal-body">
          <p>Sei sicuro di voler annullare la prenotazione per <strong id="modal-annulla-titolo"></strong>?</p>
          <p class="small text-muted mb-0">Puoi annullare entro 15 minuti senza penalità.</p>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Chiudi</button>
          <button type="button" class="btn btn-danger" id="modal-annulla-confirm">Annulla prenotazione</button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/mybookings.js" defer></script>
<!-- impeccable-live-start -->
<script src="http://localhost:8400/live.js"></script>
<!-- impeccable-live-end -->
</body>
</html>
