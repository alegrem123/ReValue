<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrati — RE-VALUE</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
      crossorigin="anonymous"
    />

    <style>
      .strength-bar {
        height: 4px;
        border-radius: 2px;
        transition: width 0.3s ease, background-color 0.3s ease;
      }
      .auth-card { max-width: 520px; }
    </style>
  </head>
  <body>
    <div id="navbar-container"></div>

    <main>
      <div class="auth-wrapper">
        <div class="auth-card">
          <div class="auth-card-header">
            <div class="auth-logo">RE-VALUE</div>
            <h1 class="h4 mb-1 fw-bold">Crea il tuo account</h1>
            <p class="mb-0 small" style="opacity:0.75">Unisciti alla community</p>
          </div>

          <div class="auth-card-body">
            <!-- Alert errore / successo -->
            <div id="alert-box" class="alert d-none mb-3" role="alert"></div>

            <form id="register-form" novalidate>
              <!-- Nome + Cognome -->
              <div class="row g-3 mb-3">
                <div class="col-sm-6">
                  <label for="nome" class="form-label fw-semibold">
                    Nome <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    id="nome"
                    name="nome"
                    class="form-control"
                    placeholder="Mario"
                    autocomplete="given-name"
                    required
                  />
                  <div class="invalid-feedback">Nome obbligatorio.</div>
                </div>
                <div class="col-sm-6">
                  <label for="cognome" class="form-label fw-semibold">
                    Cognome <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    id="cognome"
                    name="cognome"
                    class="form-control"
                    placeholder="Rossi"
                    autocomplete="family-name"
                    required
                  />
                  <div class="invalid-feedback">Cognome obbligatorio.</div>
                </div>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label fw-semibold">
                  Email <span class="text-danger">*</span>
                </label>
                <div class="input-group">
                  <span class="input-group-text"
                    ><i class="bi bi-envelope"></i
                  ></span>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-control"
                    placeholder="mario.rossi@email.it"
                    autocomplete="email"
                    required
                  />
                </div>
                <div
                  id="email-feedback"
                  class="invalid-feedback d-block d-none text-danger small mt-1"
                ></div>
              </div>

              <!-- Password -->
              <div class="mb-3">
                <label for="password" class="form-label fw-semibold">
                  Password <span class="text-danger">*</span>
                </label>
                <div class="input-group">
                  <span class="input-group-text"
                    ><i class="bi bi-lock"></i
                  ></span>
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    placeholder="Minimo 8 caratteri"
                    autocomplete="new-password"
                    required
                    minlength="8"
                  />
                  <button
                    type="button"
                    class="btn btn-outline-secondary password-toggle"
                    data-target="password"
                    tabindex="-1"
                    aria-label="Mostra/nascondi password"
                  >
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
                <!-- Barra forza password -->
                <div class="mt-1">
                  <div class="progress" style="height: 4px">
                    <div
                      id="strength-bar"
                      class="progress-bar strength-bar"
                      role="progressbar"
                      style="width: 0%"
                    ></div>
                  </div>
                  <small id="strength-label" class="text-muted"></small>
                </div>
                <div
                  id="password-feedback"
                  class="text-danger small mt-1 d-none"
                ></div>
              </div>

              <!-- Conferma Password -->
              <div class="mb-4">
                <label for="conferma-password" class="form-label fw-semibold">
                  Conferma password <span class="text-danger">*</span>
                </label>
                <div class="input-group">
                  <span class="input-group-text"
                    ><i class="bi bi-lock-fill"></i
                  ></span>
                  <input
                    type="password"
                    id="conferma-password"
                    name="conferma-password"
                    class="form-control"
                    placeholder="Ripeti la password"
                    autocomplete="new-password"
                    required
                  />
                  <button
                    type="button"
                    class="btn btn-outline-secondary password-toggle"
                    data-target="conferma-password"
                    tabindex="-1"
                    aria-label="Mostra/nascondi conferma password"
                  >
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
                <div
                  id="conferma-feedback"
                  class="text-danger small mt-1 d-none"
                ></div>
              </div>

              <!-- Submit -->
              <div class="d-grid">
                <button type="submit" id="btn-submit" class="btn btn-success btn-lg">
                  <span
                    id="btn-spinner"
                    class="spinner-border spinner-border-sm me-2 d-none"
                    role="status"
                  ></span>
                  <i id="btn-icon" class="bi bi-person-check me-2"></i>
                  Registrati
                </button>
              </div>
            </form>

            <hr class="my-4" />

            <p class="text-center mb-0 small">
              Hai già un account?
              <a
                href="login.html"
                class="text-decoration-none fw-semibold"
                style="color: var(--rv-green)"
              >
                Accedi qui
              </a>
            </p>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-container"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="../js/layout.js" defer></script>
    <script src="../js/apiClient.js" defer></script>

    <script>
      const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      /* ── Toggle visibilità password ── */
      document.querySelectorAll('.password-toggle').forEach((btn) => {
        btn.addEventListener('click', () => {
          const input = document.getElementById(btn.dataset.target);
          const icon = btn.querySelector('i');
          if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
          } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
          }
        });
      });

      /* ── Barra forza password ── */
      document
        .getElementById('password')
        .addEventListener('input', function () {
          const val = this.value;
          const bar = document.getElementById('strength-bar');
          const label = document.getElementById('strength-label');

          let score = 0;
          if (val.length >= 8) score++;
          if (/[A-Z]/.test(val)) score++;
          if (/[0-9]/.test(val)) score++;
          if (/[^A-Za-z0-9]/.test(val)) score++;

          const cfg = [
            { w: '0%', cls: '', txt: '' },
            { w: '25%', cls: 'bg-danger', txt: 'Debole' },
            { w: '50%', cls: 'bg-warning', txt: 'Discreta' },
            { w: '75%', cls: 'bg-info', txt: 'Buona' },
            { w: '100%', cls: 'bg-success', txt: 'Ottima' },
          ][score];

          bar.style.width = cfg.w;
          bar.className = `progress-bar strength-bar ${cfg.cls}`;
          label.textContent = cfg.txt;
        });

      /* ── Validazione client ── */
      function validate() {
        const nome = document.getElementById('nome').value.trim();
        const cognome = document.getElementById('cognome').value.trim();
        const email = document.getElementById('email').value.trim();
        const pwd = document.getElementById('password').value;
        const confirm = document.getElementById('conferma-password').value;

        let ok = true;

        // Nome
        const nomeEl = document.getElementById('nome');
        if (!nome) {
          nomeEl.classList.add('is-invalid');
          ok = false;
        } else {
          nomeEl.classList.remove('is-invalid');
          nomeEl.classList.add('is-valid');
        }

        // Cognome
        const cognomeEl = document.getElementById('cognome');
        if (!cognome) {
          cognomeEl.classList.add('is-invalid');
          ok = false;
        } else {
          cognomeEl.classList.remove('is-invalid');
          cognomeEl.classList.add('is-valid');
        }

        // Email
        const emailEl = document.getElementById('email');
        const emailFb = document.getElementById('email-feedback');
        if (!email || !EMAIL_RE.test(email)) {
          emailEl.classList.add('is-invalid');
          emailFb.textContent = !email
            ? 'Email obbligatoria.'
            : 'Formato email non valido.';
          emailFb.classList.remove('d-none');
          ok = false;
        } else {
          emailEl.classList.remove('is-invalid');
          emailEl.classList.add('is-valid');
          emailFb.classList.add('d-none');
        }

        // Password
        const pwdEl = document.getElementById('password');
        const pwdFb = document.getElementById('password-feedback');
        if (pwd.length < 8) {
          pwdEl.classList.add('is-invalid');
          pwdFb.textContent = 'Password minimo 8 caratteri.';
          pwdFb.classList.remove('d-none');
          ok = false;
        } else {
          pwdEl.classList.remove('is-invalid');
          pwdEl.classList.add('is-valid');
          pwdFb.classList.add('d-none');
        }

        // Conferma
        const confEl = document.getElementById('conferma-password');
        const confFb = document.getElementById('conferma-feedback');
        if (confirm !== pwd) {
          confEl.classList.add('is-invalid');
          confFb.textContent = 'Le password non coincidono.';
          confFb.classList.remove('d-none');
          ok = false;
        } else if (confirm) {
          confEl.classList.remove('is-invalid');
          confEl.classList.add('is-valid');
          confFb.classList.add('d-none');
        }

        return ok;
      }

      /* ── Submit ── */
      document
        .getElementById('register-form')
        .addEventListener('submit', async function (e) {
          e.preventDefault();

          if (!validate()) return;

          const btn = document.getElementById('btn-submit');
          const spinner = document.getElementById('btn-spinner');
          const icon = document.getElementById('btn-icon');
          const alert = document.getElementById('alert-box');

          btn.disabled = true;
          spinner.classList.remove('d-none');
          icon.classList.add('d-none');
          alert.classList.add('d-none');

          const body = {
            nome: document.getElementById('nome').value.trim(),
            cognome: document.getElementById('cognome').value.trim(),
            email: document.getElementById('email').value.trim().toLowerCase(),
            password: document.getElementById('password').value,
          };

          try {
            const response = await api.post('/api/v1/auth/register', body, {
              auth: false,
            });

            if (!response.ok) {
              throw new Error(
                response.error || 'Errore durante la registrazione.'
              );
            }

            localStorage.setItem('jwt', response.data.token);

            alert.className = 'alert alert-success';
            alert.innerHTML =
              '<i class="bi bi-check-circle me-2"></i>Registrazione completata! Reindirizzamento…';
            alert.classList.remove('d-none');

            setTimeout(() => {
              window.location.href = '../index.html';
            }, 1200);
          } catch (err) {
            alert.className = 'alert alert-danger';
            alert.innerHTML = `<i class="bi bi-exclamation-triangle me-2"></i>${err.message}`;
            alert.classList.remove('d-none');

            btn.disabled = false;
            spinner.classList.add('d-none');
            icon.classList.remove('d-none');
          }
        });

      /* ── Validazione live su blur ── */
      ['nome', 'cognome', 'email', 'password', 'conferma-password'].forEach(
        (id) => {
          document.getElementById(id).addEventListener('blur', validate);
        }
      );
    </script>
  <!-- impeccable-live-start -->
<script src="http://localhost:8400/live.js"></script>
<!-- impeccable-live-end -->
</body>
</html>
