<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin login — RE-VALUE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <main class="container py-5" style="max-width: 520px;">
      <section class="page-hero mb-4">
        <p class="page-hero-eyebrow">Area riservata</p>
        <h1 class="h3 fw-bold mb-0">Admin login</h1>
      </section>

      <div class="card">
        <div class="card-body p-4">
          <div id="admin-login-alert" class="alert d-none" role="alert"></div>
          <form id="admin-login-form" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label fw-semibold">Email</label>
              <input id="email" type="email" class="form-control" autocomplete="email" required />
            </div>
            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">Password</label>
              <input id="password" type="password" class="form-control" autocomplete="current-password" required />
            </div>
            <button id="admin-login-submit" class="btn btn-success w-100" type="submit">
              <i class="bi bi-shield-lock me-1"></i>Accedi
            </button>
          </form>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="../../js/apiClient.js"></script>
    <script>
      const form = document.getElementById('admin-login-form');
      const alertBox = document.getElementById('admin-login-alert');
      const btn = document.getElementById('admin-login-submit');

      function showError(message) {
        alertBox.className = 'alert alert-danger';
        alertBox.textContent = message;
        alertBox.classList.remove('d-none');
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        alertBox.classList.add('d-none');
        btn.disabled = true;

        const body = {
          email: document.getElementById('email').value.trim().toLowerCase(),
          password: document.getElementById('password').value,
        };

        const res = await api.post('/api/v1/auth/login', body, { auth: false });
        btn.disabled = false;

        if (!res.ok) {
          showError(res.error || 'Credenziali non valide.');
          return;
        }

        if (res.data?.user?.ruolo !== 'admin') {
          showError('Accesso negato: account non amministratore.');
          return;
        }

        localStorage.setItem('adminToken', res.data.token);
        window.location.href = 'dashboard.html';
      });
    </script>
  </body>
</html>
