<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - RE-VALUE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" crossorigin="anonymous" />
    <style>
      body {
        background: #f4f6f8;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }
      .admin-login {
        max-width: 420px;
        margin: 8vh auto;
      }
      .brand-bar {
        border-left: 4px solid #2e7d32;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="admin-login">
        <div class="brand-bar bg-white border rounded shadow-sm p-4">
          <div class="d-flex align-items-center gap-2 mb-4">
            <i class="bi bi-shield-lock fs-3 text-success"></i>
            <div>
              <h1 class="h4 mb-0">RE-VALUE Admin</h1>
              <p class="text-muted small mb-0">Pannello riservato</p>
            </div>
          </div>
          <div id="admin-login-alert" class="alert alert-danger d-none" role="alert"></div>
          <form id="admin-login-form" novalidate>
            <div class="mb-3">
              <label class="form-label" for="admin-email">Email</label>
              <input class="form-control" id="admin-email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="mb-4">
              <label class="form-label" for="admin-password">Password</label>
              <input class="form-control" id="admin-password" name="password" type="password" autocomplete="current-password" required />
            </div>
            <button id="admin-login-submit" class="btn btn-success w-100" type="submit">
              <i class="bi bi-box-arrow-in-right me-1"></i>Accedi
            </button>
          </form>
        </div>
      </section>
    </main>
    <script src="../../js/admin/login.js"></script>
  </body>
</html>
