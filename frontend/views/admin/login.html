<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - RE-VALUE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous" />
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body class="rv-admin-body rv-admin-login-body">
    <main class="container">
      <section class="rv-admin-login" aria-labelledby="admin-login-title">
        <div class="rv-admin-auth-panel">
          <div class="d-flex align-items-center gap-3 mb-4">
            <span class="rv-admin-brand-mark" aria-hidden="true">
              <i class="bi bi-shield-lock"></i>
            </span>
            <div>
              <h1 id="admin-login-title" class="rv-admin-auth-title mb-1">RE-VALUE Admin</h1>
              <p class="rv-admin-muted mb-0">Accesso riservato alla moderazione</p>
            </div>
          </div>
          <div id="admin-login-alert" class="alert alert-danger rv-admin-alert d-none" role="alert" aria-live="polite"></div>
          <form id="admin-login-form" novalidate>
            <div class="mb-3">
              <label class="form-label" for="admin-email">Email</label>
              <input class="form-control" id="admin-email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="mb-4">
              <label class="form-label" for="admin-password">Password</label>
              <input class="form-control" id="admin-password" name="password" type="password" autocomplete="current-password" required />
            </div>
            <button id="admin-login-submit" class="btn btn-success w-100" type="submit">
              <i class="bi bi-box-arrow-in-right me-1"></i>Accedi al pannello
            </button>
          </form>
          <p class="rv-admin-help mb-0 mt-3">Usa solo account con ruolo admin. Le azioni di moderazione vengono registrate.</p>
        </div>
      </section>
    </main>
    <script src="../../js/admin/login.js"></script>
  <!-- impeccable-live-start -->
<script src="http://localhost:8400/live.js"></script>
<!-- impeccable-live-end -->
</body>
</html>
