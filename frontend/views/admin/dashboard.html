<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - RE-VALUE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" crossorigin="anonymous" />
    <style>
      body {
        background: #f4f6f8;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }
      .metric-card {
        border-left: 4px solid #2e7d32;
      }
      .table td,
      .table th {
        vertical-align: middle;
      }
      .admin-shell {
        max-width: 1180px;
      }
    </style>
  </head>
  <body>
    <header class="bg-white border-bottom">
      <div class="container admin-shell py-3 d-flex justify-content-between align-items-center gap-3">
        <div>
          <h1 class="h4 mb-0">Admin Dashboard</h1>
          <p class="text-muted small mb-0">RE-VALUE</p>
        </div>
        <button id="admin-logout" class="btn btn-outline-secondary btn-sm" type="button">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </div>
    </header>

    <main class="container admin-shell py-4">
      <div id="admin-alert" class="alert d-none" role="alert"></div>

      <ul class="nav nav-tabs mb-4" id="admin-tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="stats-tab" data-bs-toggle="tab" data-bs-target="#stats-panel" type="button" role="tab">
            <i class="bi bi-bar-chart me-1"></i>Statistiche
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="users-tab" data-bs-toggle="tab" data-bs-target="#users-panel" type="button" role="tab">
            <i class="bi bi-people me-1"></i>Utenti
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="annunci-tab" data-bs-toggle="tab" data-bs-target="#annunci-panel" type="button" role="tab">
            <i class="bi bi-grid me-1"></i>Annunci
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="segnalazioni-tab" data-bs-toggle="tab" data-bs-target="#segnalazioni-panel" type="button" role="tab">
            <i class="bi bi-flag me-1"></i>Segnalazioni
          </button>
        </li>
      </ul>

      <div class="tab-content">
        <section class="tab-pane fade show active" id="stats-panel" role="tabpanel" aria-labelledby="stats-tab">
          <div id="stats-cards" class="row g-3 mb-4"></div>
          <div class="bg-white border rounded p-3">
            <canvas id="stats-chart" height="120"></canvas>
          </div>
        </section>

        <section class="tab-pane fade" id="users-panel" role="tabpanel" aria-labelledby="users-tab">
          <div class="bg-white border rounded p-3 mb-3">
            <form id="users-search-form" class="row g-2 align-items-end">
              <div class="col-md-8">
                <label for="users-search" class="form-label">Cerca</label>
                <input id="users-search" class="form-control" type="search" placeholder="Email, nome o cognome" />
              </div>
              <div class="col-md-4 d-grid">
                <button class="btn btn-success" type="submit">
                  <i class="bi bi-search me-1"></i>Cerca
                </button>
              </div>
            </form>
          </div>
          <div class="table-responsive bg-white border rounded">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>Utente</th>
                  <th>Email</th>
                  <th>Stato</th>
                  <th>Malus</th>
                  <th class="text-end">Azioni</th>
                </tr>
              </thead>
              <tbody id="users-table-body"></tbody>
            </table>
          </div>
          <div id="users-pagination" class="d-flex justify-content-between align-items-center mt-3"></div>
        </section>

        <section class="tab-pane fade" id="annunci-panel" role="tabpanel" aria-labelledby="annunci-tab">
          <div class="bg-white border rounded p-4 text-muted">Tab annunci pianificata per il 28 maggio.</div>
        </section>

        <section class="tab-pane fade" id="segnalazioni-panel" role="tabpanel" aria-labelledby="segnalazioni-tab">
          <div class="bg-white border rounded p-4 text-muted">Tab segnalazioni pianificata per il 28 maggio.</div>
        </section>
      </div>
    </main>

    <div class="modal fade" id="confirm-user-modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title h5" id="confirm-user-title">Conferma</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Chiudi"></button>
          </div>
          <div class="modal-body" id="confirm-user-body"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Annulla</button>
            <button type="button" class="btn btn-danger" id="confirm-user-action">Conferma</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="../../js/admin/shared.js"></script>
    <script src="../../js/admin/stats.js"></script>
    <script src="../../js/admin/users.js"></script>
  </body>
</html>
