<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin dashboard — RE-VALUE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg sticky-top rv-navbar">
      <div class="container">
        <a class="navbar-brand" href="../../index.html">RE-VALUE Admin</a>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-light btn-sm" href="../catalog.html">Catalogo</a>
          <button id="admin-logout" class="btn btn-warning btn-sm">Logout</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <section class="page-hero mb-4">
        <p class="page-hero-eyebrow">UC13 · RF29 · RF30 · RF31</p>
        <h1 class="h3 fw-bold mb-0">Dashboard amministratore</h1>
      </section>

      <ul class="nav nav-tabs" id="admin-tabs" role="tablist">
        <li class="nav-item" role="presentation"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-stats" type="button">Statistiche</button></li>
        <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-users" type="button">Utenti</button></li>
        <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-annunci" type="button">Annunci</button></li>
        <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-reports" type="button">Segnalazioni</button></li>
      </ul>

      <div class="tab-content bg-white border border-top-0 p-3 p-md-4">
        <section class="tab-pane fade show active" id="tab-stats">
          <div id="admin-stats-alert" class="alert d-none" role="alert"></div>
          <div class="row g-3" id="admin-stats-cards"></div>
          <canvas id="admin-stats-chart" class="mt-4" height="110"></canvas>
        </section>

        <section class="tab-pane fade" id="tab-users">
          <div class="d-flex flex-column flex-md-row gap-2 justify-content-between mb-3">
            <input id="admin-users-search" class="form-control" style="max-width: 360px;" placeholder="Cerca email, nome o ID" />
            <button id="admin-users-refresh" class="btn btn-outline-success">Aggiorna</button>
          </div>
          <div id="admin-users-alert" class="alert d-none" role="alert"></div>
          <div class="table-responsive"><table class="table align-middle"><thead><tr><th>Utente</th><th>Stato</th><th>Malus</th><th>Azioni</th></tr></thead><tbody id="admin-users-body"></tbody></table></div>
        </section>

        <section class="tab-pane fade" id="tab-annunci">
          <div class="d-flex flex-column flex-md-row gap-2 justify-content-between mb-3">
            <input id="admin-annunci-search" class="form-control" style="max-width: 360px;" placeholder="Cerca titolo o categoria" />
            <button id="admin-annunci-refresh" class="btn btn-outline-success">Aggiorna</button>
          </div>
          <div id="admin-annunci-alert" class="alert d-none" role="alert"></div>
          <div class="table-responsive"><table class="table align-middle"><thead><tr><th>Annuncio</th><th>Donatore</th><th>Stato</th><th>Azioni</th></tr></thead><tbody id="admin-annunci-body"></tbody></table></div>
        </section>

        <section class="tab-pane fade" id="tab-reports">
          <div class="d-flex justify-content-end mb-3"><button id="admin-reports-refresh" class="btn btn-outline-success">Aggiorna</button></div>
          <div id="admin-reports-alert" class="alert d-none" role="alert"></div>
          <div class="table-responsive"><table class="table align-middle"><thead><tr><th>Segnalazione</th><th>Utenti</th><th>Stato</th><th>Azioni</th></tr></thead><tbody id="admin-reports-body"></tbody></table></div>
        </section>
      </div>
    </main>

    <div id="rv-toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" crossorigin="anonymous"></script>
    <script src="../../js/admin/api.js"></script>
    <script src="../../js/admin/stats.js"></script>
    <script src="../../js/admin/users.js"></script>
    <script src="../../js/admin/annunci.js"></script>
    <script src="../../js/admin/segnalazioni.js"></script>
    <script>
      if (!localStorage.getItem('adminToken')) window.location.href = 'login.html';
      document.getElementById('admin-logout').addEventListener('click', () => {
        localStorage.removeItem('adminToken');
        window.location.href = 'login.html';
      });
      document.addEventListener('DOMContentLoaded', () => {
        window.AdminStats.init();
        window.AdminUsers.init();
        window.AdminAnnunci.init();
        window.AdminSegnalazioni.init();
      });
    </script>
  </body>
</html>
