<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scansione QR — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    crossorigin="anonymous"
  />
  <style>
#qr-reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
    }

    /* Sovrascrive stili inline di html5-qrcode */
    #qr-reader__scan_region {
      border-radius: 12px;
    }

    .mode-btn.active {
      background-color: var(--rv-green);
      color: #fff;
      border-color: var(--rv-green);
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5">
    <div id="scan-alert" class="alert d-none" role="alert"></div>

    <section class="page-hero">
      <p class="page-hero-eyebrow">Conferma scambio</p>
      <h1 class="h3 fw-bold mb-1">Scansiona il QR del donatore</h1>
      <p class="text-muted mb-0">Inquadra il codice mostrato dal donatore per certificare il ritiro.</p>
    </section>

    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">

        <!-- Toggle modalità -->
        <div class="d-flex gap-2 mb-4">
          <button class="btn btn-outline-secondary mode-btn active flex-fill" id="btn-webcam">
            <i class="bi bi-camera me-1"></i>Webcam
          </button>
          <button class="btn btn-outline-secondary mode-btn flex-fill" id="btn-manual">
            <i class="bi bi-keyboard me-1"></i>Inserimento manuale
          </button>
        </div>

        <!-- Modalità webcam -->
        <div id="webcam-section">
          <div id="qr-reader" class="mb-3"></div>
          <p class="text-muted small text-center">
            <i class="bi bi-info-circle me-1"></i>Mantieni il QR ben illuminato e centrato.
          </p>
        </div>

        <!-- Modalità manuale (RF27) -->
        <div id="manual-section" class="d-none">
          <div class="card border-0 shadow-sm p-4">
            <label for="manual-code" class="form-label fw-semibold">Codice QR</label>
            <input
              type="text"
              class="form-control form-control-lg font-monospace mb-3"
              id="manual-code"
              placeholder="Incolla il codice qui..."
              autocomplete="off"
            />
            <button class="btn btn-success w-100" id="btn-valida-manual">
              <i class="bi bi-check2-circle me-2"></i>Valida codice
            </button>
          </div>
        </div>

        <a href="mybookings.html" class="btn btn-outline-secondary w-100 mt-3">
          <i class="bi bi-arrow-left me-2"></i>Torna alle prenotazioni
        </a>

      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/qr-scan.js" defer></script>
</body>
</html>
