<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accedi — RE-VALUE</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />

    <style>
      :root {
        --rv-green: #2e7d32;
        --rv-green-light: #43a047;
        --rv-green-dark: #1b5e20;
        --rv-accent: #ffc107;
      }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background-color: #f8f9fa;
      }

      .login-card {
        max-width: 440px;
        margin: 4rem auto;
      }

      .login-card .card-header {
        background: linear-gradient(
          135deg,
          var(--rv-green-dark) 0%,
          var(--rv-green-light) 100%
        );
        color: #fff;
      }

      .btn-rv {
        background-color: var(--rv-green);
        border-color: var(--rv-green);
        color: #fff;
        font-weight: 600;
      }

      .btn-rv:hover {
        background-color: var(--rv-green-dark);
        border-color: var(--rv-green-dark);
        color: #fff;
      }

      .btn-rv:disabled {
        opacity: 0.65;
      }
    </style>
  </head>
  <body>
    <div id="navbar-container"></div>

    <main class="container py-4">
      <div class="login-card">
        <div class="card shadow-sm border-0">
          <div class="card-header py-3 text-center rounded-top">
            <h1 class="h4 mb-0 fw-bold">
              <i class="bi bi-box-arrow-in-right me-2"></i>Accedi a RE-VALUE
            </h1>
            <p class="mb-0 mt-1 small opacity-75">Bentornato nella community</p>
          </div>

          <div class="card-body p-4">
            <div id="alert-box" class="alert d-none mb-3" role="alert"></div>

            <form id="login-form" novalidate>
              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label fw-semibold">
                  Email <span class="text-danger">*</span>
                </label>
                <div class="input-group">
                  <span class="input-group-text"
                    ><i class="bi bi-envelope"></i
                  ></span>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-control"
                    placeholder="mario.rossi@email.it"
                    autocomplete="email"
                    required
                  />
                </div>
                <div
                  id="email-feedback"
                  class="text-danger small mt-1 d-none"
                ></div>
              </div>

              <!-- Password -->
              <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center">
                  <label for="password" class="form-label fw-semibold mb-0">
                    Password <span class="text-danger">*</span>
                  </label>
                </div>
                <div class="input-group mt-1">
                  <span class="input-group-text"
                    ><i class="bi bi-lock"></i
                  ></span>
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    placeholder="La tua password"
                    autocomplete="current-password"
                    required
                  />
                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    id="pwd-toggle"
                    tabindex="-1"
                    aria-label="Mostra/nascondi password"
                  >
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
                <div
                  id="password-feedback"
                  class="text-danger small mt-1 d-none"
                ></div>
              </div>

              <!-- Submit -->
              <div class="d-grid">
                <button type="submit" id="btn-submit" class="btn btn-rv btn-lg">
                  <span
                    id="btn-spinner"
                    class="spinner-border spinner-border-sm me-2 d-none"
                    role="status"
                  ></span>
                  <i id="btn-icon" class="bi bi-box-arrow-in-right me-2"></i>
                  Accedi
                </button>
              </div>
            </form>

            <hr class="my-4" />

            <p class="text-center mb-0 small">
              Non hai un account?
              <a
                href="register.html"
                class="text-decoration-none fw-semibold"
                style="color: var(--rv-green)"
              >
                Registrati gratis
              </a>
            </p>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-container"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="../js/layout.js" defer></script>
    <script src="../js/apiClient.js" defer></script>

    <script>
      const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      /* ── Se già loggato, redirect diretto ── */
      (function () {
        try {
          const token = localStorage.getItem('jwt');
          if (!token) return;
          const payload = JSON.parse(atob(token.split('.')[1]));
          if (!payload.exp || Date.now() / 1000 < payload.exp) {
            window.location.href = '../index.html';
          }
        } catch {
          /* token malformato, ignora */
        }
      })();

      /* ── Toggle visibilità password ── */
      document
        .getElementById('pwd-toggle')
        .addEventListener('click', function () {
          const input = document.getElementById('password');
          const icon = this.querySelector('i');
          if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
          } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
          }
        });

      /* ── Validazione ── */
      function validate() {
        const email = document.getElementById('email').value.trim();
        const pwd = document.getElementById('password').value;
        let ok = true;

        const emailEl = document.getElementById('email');
        const emailFb = document.getElementById('email-feedback');
        if (!email || !EMAIL_RE.test(email)) {
          emailEl.classList.add('is-invalid');
          emailFb.textContent = !email
            ? 'Email obbligatoria.'
            : 'Formato email non valido.';
          emailFb.classList.remove('d-none');
          ok = false;
        } else {
          emailEl.classList.remove('is-invalid');
          emailEl.classList.add('is-valid');
          emailFb.classList.add('d-none');
        }

        const pwdEl = document.getElementById('password');
        const pwdFb = document.getElementById('password-feedback');
        if (!pwd) {
          pwdEl.classList.add('is-invalid');
          pwdFb.textContent = 'Password obbligatoria.';
          pwdFb.classList.remove('d-none');
          ok = false;
        } else {
          pwdEl.classList.remove('is-invalid');
          pwdEl.classList.add('is-valid');
          pwdFb.classList.add('d-none');
        }

        return ok;
      }

      /* ── Submit ── */
      document
        .getElementById('login-form')
        .addEventListener('submit', async function (e) {
          e.preventDefault();

          if (!validate()) return;

          const btn = document.getElementById('btn-submit');
          const spinner = document.getElementById('btn-spinner');
          const icon = document.getElementById('btn-icon');
          const alertEl = document.getElementById('alert-box');

          btn.disabled = true;
          spinner.classList.remove('d-none');
          icon.classList.add('d-none');
          alertEl.classList.add('d-none');

          const body = {
            email: document.getElementById('email').value.trim().toLowerCase(),
            password: document.getElementById('password').value,
          };

          try {
            const response = await api.post('/api/auth/login', body, {
              auth: false,
            });

            if (!response.ok) {
              throw new Error(response.error || 'Credenziali non valide.');
            }

            localStorage.setItem('jwt', response.data.token);

            alertEl.className = 'alert alert-success';
            alertEl.innerHTML =
              '<i class="bi bi-check-circle me-2"></i>Accesso effettuato! Reindirizzamento…';
            alertEl.classList.remove('d-none');

            /* Redirect a pagina di origine se passata in query string, altrimenti home */
            const params = new URLSearchParams(window.location.search);
            const rawRedirect = params.get('redirect');
            const redirect = rawRedirect
              ? rawRedirect.replace(/^\/(?:frontend\/)?views\//, '')
              : '../index.html';
            setTimeout(() => {
              window.location.href = redirect;
            }, 1000);
          } catch (err) {
            alertEl.className = 'alert alert-danger';
            alertEl.innerHTML = `<i class="bi bi-exclamation-triangle me-2"></i>${err.message}`;
            alertEl.classList.remove('d-none');

            btn.disabled = false;
            spinner.classList.add('d-none');
            icon.classList.remove('d-none');
          }
        });

      /* ── Validazione live su blur ── */
      ['email', 'password'].forEach((id) => {
        document.getElementById(id).addEventListener('blur', validate);
      });
    </script>
  </body>
</html>
