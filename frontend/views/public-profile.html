<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profilo pubblico — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    crossorigin="anonymous"
  />
  <style>
    :root {
      --rv-green: #2E7D32;
      --rv-green-light: #43A047;
      --rv-green-dark: #1B5E20;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #f8f9fa;
    }

    .profile-header {
      border-left: 4px solid var(--rv-green);
    }

    .avatar-circle {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rv-green-dark), var(--rv-green-light));
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5" style="max-width: 920px;">
    <div id="public-profile-alert" class="alert d-none" role="alert"></div>

    <section class="bg-white rounded-4 p-4 shadow-sm mb-4 profile-header">
      <div class="d-flex flex-column flex-md-row align-items-md-center gap-4">
        <div id="public-profile-avatar" class="avatar-circle">
          <i class="bi bi-person-fill"></i>
        </div>
        <div class="flex-grow-1">
          <p class="text-uppercase small text-success mb-2">Profilo pubblico</p>
          <h1 id="public-profile-name" class="h3 fw-bold mb-2">Caricamento...</h1>
          <p id="public-profile-meta" class="text-muted mb-0"></p>
        </div>
        <a href="catalog.html" class="btn btn-outline-success">Catalogo</a>
      </div>
    </section>

    <div class="row g-4">
      <section class="col-lg-5">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body p-4">
            <h2 class="h5 fw-bold mb-3">Recensioni</h2>
            <div class="row g-3 text-center">
              <div class="col-4">
                <div id="review-total" class="fs-3 fw-bold">0</div>
                <div class="text-muted small">Totali</div>
              </div>
              <div class="col-4">
                <div id="review-positive" class="fs-3 fw-bold text-success">0</div>
                <div class="text-muted small">Positive</div>
              </div>
              <div class="col-4">
                <div id="review-negative" class="fs-3 fw-bold text-danger">0</div>
                <div class="text-muted small">Negative</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="col-lg-7">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body p-4">
            <h2 class="h5 fw-bold mb-3">Informazioni</h2>
            <dl class="row mb-0">
              <dt class="col-sm-4 text-muted">Città</dt>
              <dd id="public-profile-city" class="col-sm-8">—</dd>
              <dt class="col-sm-4 text-muted">Descrizione</dt>
              <dd id="public-profile-description" class="col-sm-8">—</dd>
              <dt class="col-sm-4 text-muted">Iscritto dal</dt>
              <dd id="public-profile-created" class="col-sm-8">—</dd>
            </dl>
          </div>
        </div>
      </section>
    </div>

    <section class="card border-0 shadow-sm mt-4">
      <div class="card-body p-4">
        <h2 class="h5 fw-bold mb-3">Ultime recensioni</h2>
        <div id="public-profile-reviews" class="vstack gap-3"></div>
      </div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/publicProfile.js" defer></script>
</body>
</html>
