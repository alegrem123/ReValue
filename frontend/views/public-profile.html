<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profilo pubblico — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    crossorigin="anonymous"
  />
  <style>
.avatar-circle {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rv-green-dark), var(--rv-green-light));
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    /* ── Contatori recensioni nell'header profilo ── */
    .review-counters {
      display: flex;
      gap: 1.25rem;
      margin-top: 0.75rem;
    }

    .review-counter-item {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.9);
    }

    .review-counter-item .counter-value {
      font-weight: 800;
      font-size: 1.1rem;
      color: #fff;
    }

    .review-counter-item .bi {
      font-size: 1rem;
    }

    /* ── Lista recensioni ── */
    .review-item {
      border: 1px solid var(--rv-border, #DDD8CF);
      border-radius: var(--rv-radius-sm, 8px);
      padding: 1rem 1.125rem;
      background: var(--rv-surface, #fff);
      transition: box-shadow 220ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .review-item:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .review-icon-positive {
      color: var(--rv-green, #2E7D32);
    }

    .review-icon-negative {
      color: var(--rv-danger, #C62828);
    }

    .review-text {
      color: var(--rv-text-muted, #6B7280);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    #btn-load-more-reviews {
      transition: all 220ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ── Badge reputazione (RF8) ── */
    .reputation-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0.75rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(4px);
    }

    .reputation-badge .bi {
      font-size: 0.85rem;
    }

    .reputation-badge--green {
      background: rgba(76, 175, 80, 0.25);
      color: #A5D6A7;
      border-color: rgba(76, 175, 80, 0.4);
    }

    .reputation-badge--yellow {
      background: rgba(255, 193, 7, 0.25);
      color: #FFE082;
      border-color: rgba(255, 193, 7, 0.4);
    }

    .reputation-badge--red {
      background: rgba(244, 67, 54, 0.25);
      color: #EF9A9A;
      border-color: rgba(244, 67, 54, 0.4);
    }

    .reputation-badge--neutral {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.7);
      border-color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5" style="max-width: 920px;">
    <div id="public-profile-alert" class="alert d-none" role="alert"></div>

    <section class="page-hero">
      <div class="d-flex flex-column flex-md-row align-items-md-center gap-4">
        <div id="public-profile-avatar" class="avatar-circle">
          <i class="bi bi-person-fill"></i>
        </div>
        <div class="flex-grow-1">
          <p class="page-hero-eyebrow">Profilo pubblico</p>
          <h1 id="public-profile-name" class="h3 fw-bold mb-2">Caricamento...</h1>
          <p id="public-profile-meta" class="text-muted mb-0"></p>

          <!-- Contatori recensioni nell'header profilo (RF8) -->
          <div id="review-counters" class="review-counters d-none">
            <span id="reputation-badge" class="reputation-badge d-none"></span>
            <div class="review-counter-item">
              <i class="bi bi-hand-thumbs-up-fill" style="color: #81C784;"></i>
              <span id="review-positive" class="counter-value">0</span>
              <span>positive</span>
            </div>
            <div class="review-counter-item">
              <i class="bi bi-hand-thumbs-down-fill" style="color: #EF9A9A;"></i>
              <span id="review-negative" class="counter-value">0</span>
              <span>negative</span>
            </div>
          </div>
        </div>
        <a href="catalog.html" class="btn btn-outline-light btn-sm">Catalogo</a>
      </div>
    </section>

    <div class="row g-4">
      <section class="col-lg-5">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body p-4">
            <h2 class="h5 fw-bold mb-3">Recensioni</h2>
            <div class="row g-3 text-center">
              <div class="col-4">
                <div id="review-total" class="fs-3 fw-bold">0</div>
                <div class="text-muted small">Totali</div>
              </div>
              <div class="col-4">
                <div id="review-positive-card" class="fs-3 fw-bold text-success">0</div>
                <div class="text-muted small">Positive</div>
              </div>
              <div class="col-4">
                <div id="review-negative-card" class="fs-3 fw-bold text-danger">0</div>
                <div class="text-muted small">Negative</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="col-lg-7">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body p-4">
            <h2 class="h5 fw-bold mb-3">Informazioni</h2>
            <dl class="row mb-0">
              <dt class="col-sm-4 text-muted">Città</dt>
              <dd id="public-profile-city" class="col-sm-8">—</dd>
              <dt class="col-sm-4 text-muted">Descrizione</dt>
              <dd id="public-profile-description" class="col-sm-8">—</dd>
              <dt class="col-sm-4 text-muted">Iscritto dal</dt>
              <dd id="public-profile-created" class="col-sm-8">—</dd>
            </dl>
          </div>
        </div>
      </section>
    </div>

    <!-- ── Sezione lista recensioni (RF8) ── -->
    <section class="card border-0 shadow-sm mt-4">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 fw-bold mb-0">Ultime recensioni</h2>
          <span id="review-count-label" class="badge bg-secondary d-none">0</span>
        </div>
        <div id="public-profile-reviews" class="vstack gap-3"></div>

        <!-- Pulsante "Carica altre" per paginazione -->
        <div id="load-more-wrapper" class="text-center mt-3 d-none">
          <button class="btn btn-outline-success btn-sm" id="btn-load-more-reviews">
            <i class="bi bi-arrow-down-circle me-1"></i>Carica altre recensioni
          </button>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/publicProfile.js" defer></script>
</body>
</html>
