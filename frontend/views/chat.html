<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
    crossorigin="anonymous"
  />
  <style>
/* Layout fisso: header + area messaggi scrollabile + input fisso in fondo */
    .chat-wrapper {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    .chat-header {
      background: #fff;
      border-bottom: 1px solid #dee2e6;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-header .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #43A047, var(--rv-green-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      font-size: 0.95rem;
      flex-shrink: 0;
    }

    /* Area messaggi */
    #messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Bolle */
    .bubble-row {
      display: flex;
    }

    .bubble-row.mine  { justify-content: flex-end; }
    .bubble-row.other { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 8px 14px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.45;
      word-break: break-word;
      background-color: #fff;
      color: #212529;
      border: 1px solid #dee2e6;
    }

    .bubble.mine  { border-bottom-right-radius: 4px; }
    .bubble.other { border-bottom-left-radius: 4px; }

    .bubble-time {
      font-size: 0.72rem;
      margin-top: 3px;
      text-align: right;
      color: #6c757d;
    }

    .bubble.mine .read-tick { font-size: 0.75rem; }
    .tick-inviato           { color: #adb5bd; }
    .tick-letto             { color: #2E7D32; }

    /* Input area */
    .chat-input-bar {
      background: #fff;
      border-top: 1px solid #dee2e6;
      padding: 10px 16px;
      /* iOS safe area per notch/home indicator */
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      resize: none;
      border-radius: 22px;
      padding: 10px 16px;
      border: 1px solid #dee2e6;
      font-size: 0.95rem;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
    }

    #msg-input:focus { outline: none; border-color: var(--rv-green); box-shadow: 0 0 0 2px rgba(46,125,50,.15); }

    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background-color: var(--rv-green);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send-btn:disabled { opacity: 0.4; cursor: default; }

    /* Bottone allegato clip */
    #attach-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: #6c757d;
      font-size: 1.15rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #attach-btn:hover {
      background: var(--rv-green-xlight, #E8F5E9);
      color: var(--rv-green, #2E7D32);
    }

    /* Anteprima immagine allegata */
    .img-preview-strip {
      display: none;
      background: #f8f9fa;
      border-top: 1px solid #dee2e6;
      padding: 8px 16px;
      flex-shrink: 0;
    }
    .img-preview-strip.visible { display: flex; align-items: center; gap: 10px; }

    .img-preview-strip .preview-thumb {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid #dee2e6;
    }

    .img-preview-strip .preview-name {
      flex: 1;
      font-size: 0.82rem;
      color: #495057;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .img-preview-strip .preview-size {
      font-size: 0.75rem;
      color: #6c757d;
    }

    #preview-remove {
      background: transparent;
      border: none;
      color: #dc3545;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    #preview-remove:hover { background: #f8d7da; }

    /* Immagine dentro la bolla */
    .bubble-img {
      max-width: 100%;
      max-height: 240px;
      border-radius: 12px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .bubble-img:hover { transform: scale(1.02); }

    /* Lightbox overlay per ingrandire immagine */
    .img-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(0,0,0,.85);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .img-lightbox.open { display: flex; }
    .img-lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    /* Indicatore "sta scrivendo" */
    .typing-indicator {
      display: none;
      padding: 4px 16px 2px;
      flex-shrink: 0;
    }
    .typing-indicator.visible { display: flex; align-items: center; gap: 6px; }

    .typing-indicator .typing-text {
      font-size: 0.78rem;
      color: #6c757d;
      font-style: italic;
    }

    .typing-dots {
      display: flex;
      gap: 3px;
      align-items: center;
    }
    .typing-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #6c757d;
      animation: typingBounce 1.4s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1;   }
    }

    .date-divider {
      text-align: center;
      color: #6c757d;
      font-size: 0.78rem;
      margin: 8px 0 4px;
    }

    #chat-alert {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      min-width: 280px;
    }

    /* ── Search bar ──────────────────────────────────────────── */
    #search-toggle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: #495057;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      cursor: pointer;
      margin-left: auto;
      flex-shrink: 0;
    }
    #search-toggle:hover {
      background: var(--rv-green-xlight, #E8F5E9);
      color: var(--rv-green, #2E7D32);
    }

    .search-bar {
      display: none;
      background: #fff;
      border-bottom: 1px solid #dee2e6;
      padding: 8px 12px;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      animation: slideDown 0.2s ease;
    }
    .search-bar.open { display: flex; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #search-input {
      flex: 1;
      border: 1px solid #dee2e6;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #search-input:focus {
      border-color: var(--rv-green, #2E7D32);
      box-shadow: 0 0 0 2px rgba(46,125,50,.12);
    }

    .search-nav {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .search-nav button {
      background: transparent;
      border: none;
      color: #495057;
      font-size: 1rem;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .search-nav button:hover { background: #e9ecef; }
    .search-nav button:disabled { opacity: 0.3; cursor: default; }

    #search-count {
      font-size: 0.78rem;
      color: #6c757d;
      white-space: nowrap;
      min-width: 48px;
      text-align: center;
    }

    #search-close {
      background: transparent;
      border: none;
      color: #6c757d;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }
    #search-close:hover { background: #e9ecef; color: #dc3545; }

    /* Evidenziazione risultati ricerca */
    mark.search-hl {
      background: #FFF176;
      color: inherit;
      padding: 1px 2px;
      border-radius: 3px;
    }
    mark.search-hl.active {
      background: #FFB300;
      outline: 2px solid #FF8F00;
    }
  </style>
</head>
<body>

  <div id="chat-alert" class="alert d-none" role="alert"></div>

  <div class="chat-wrapper">

    <!-- Header -->
    <div class="chat-header">
      <a href="messaggi.html" class="btn btn-sm btn-outline-secondary me-1">
        <i class="bi bi-arrow-left"></i>
      </a>
      <div class="avatar" id="header-avatar">?</div>
      <div>
        <div class="fw-bold" id="header-name">Caricamento...</div>
        <div class="text-muted small" id="header-sub"></div>
      </div>
      <button id="search-toggle" aria-label="Cerca nei messaggi" title="Cerca nei messaggi">
        <i class="bi bi-search"></i>
      </button>
    </div>

    <!-- Barra di ricerca espandibile -->
    <div class="search-bar" id="search-bar">
      <i class="bi bi-search text-muted" style="font-size:.9rem"></i>
      <input
        id="search-input"
        type="search"
        placeholder="Cerca nei messaggi..."
        aria-label="Cerca nei messaggi"
        autocomplete="off"
      />
      <div class="search-nav" id="search-nav" style="display:none">
        <span id="search-count"></span>
        <button id="search-prev" aria-label="Risultato precedente" disabled>
          <i class="bi bi-chevron-up"></i>
        </button>
        <button id="search-next" aria-label="Risultato successivo" disabled>
          <i class="bi bi-chevron-down"></i>
        </button>
      </div>
      <button id="search-close" aria-label="Chiudi ricerca" title="Chiudi ricerca">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <!-- Area messaggi -->
    <div id="messages-area">
      <div class="text-center py-4">
        <div class="spinner-border spinner-border-sm text-success" role="status"></div>
      </div>
    </div>

    <!-- Indicatore "sta scrivendo" -->
    <div class="typing-indicator" id="typing-indicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span class="typing-text">sta scrivendo</span>
    </div>

    <!-- Anteprima immagine allegata -->
    <div class="img-preview-strip" id="img-preview">
      <img class="preview-thumb" id="preview-thumb" src="" alt="Anteprima" />
      <div>
        <div class="preview-name" id="preview-name"></div>
        <div class="preview-size" id="preview-size"></div>
      </div>
      <button id="preview-remove" aria-label="Rimuovi allegato" title="Rimuovi allegato">
        <i class="bi bi-x-circle-fill"></i>
      </button>
    </div>

    <!-- Input -->
    <div class="chat-input-bar">
      <input type="file" id="file-input" accept="image/*" hidden />
      <button id="attach-btn" aria-label="Allega immagine" title="Allega immagine">
        <i class="bi bi-paperclip"></i>
      </button>
      <textarea
        id="msg-input"
        rows="1"
        placeholder="Scrivi un messaggio..."
        aria-label="Messaggio"
      ></textarea>
      <button id="send-btn" disabled aria-label="Invia">
        <i class="bi bi-send-fill"></i>
      </button>
    </div>

    <!-- Lightbox immagine -->
    <div class="img-lightbox" id="img-lightbox">
      <img id="lightbox-img" src="" alt="Immagine ingrandita" />
    </div>

  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/chat.js" defer></script>
</body>
</html>
