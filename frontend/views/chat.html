<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    crossorigin="anonymous"
  />
  <style>
/* Layout fisso: header + area messaggi scrollabile + input fisso in fondo */
    .chat-wrapper {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    .chat-header {
      background: #fff;
      border-bottom: 1px solid #dee2e6;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-header .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #43A047, var(--rv-green-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      font-size: 0.95rem;
      flex-shrink: 0;
    }

    /* Area messaggi */
    #messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Bolle */
    .bubble-row {
      display: flex;
    }

    .bubble-row.mine  { justify-content: flex-end; }
    .bubble-row.other { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 8px 14px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.45;
      word-break: break-word;
      background-color: #fff;
      color: #212529;
      border: 1px solid #dee2e6;
    }

    .bubble.mine  { border-bottom-right-radius: 4px; }
    .bubble.other { border-bottom-left-radius: 4px; }

    .bubble-time {
      font-size: 0.72rem;
      margin-top: 3px;
      text-align: right;
      color: #6c757d;
    }

    .bubble.mine .read-tick { font-size: 0.75rem; }
    .tick-inviato           { color: #adb5bd; }
    .tick-letto             { color: #2E7D32; }

    /* Input area */
    .chat-input-bar {
      background: #fff;
      border-top: 1px solid #dee2e6;
      padding: 10px 16px;
      /* iOS safe area per notch/home indicator */
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      resize: none;
      border-radius: 22px;
      padding: 10px 16px;
      border: 1px solid #dee2e6;
      font-size: 0.95rem;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
    }

    #msg-input:focus { outline: none; border-color: var(--rv-green); box-shadow: 0 0 0 2px rgba(46,125,50,.15); }

    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background-color: var(--rv-green);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send-btn:disabled { opacity: 0.4; cursor: default; }

    .date-divider {
      text-align: center;
      color: #6c757d;
      font-size: 0.78rem;
      margin: 8px 0 4px;
    }

    #chat-alert {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      min-width: 280px;
    }
  </style>
</head>
<body>

  <div id="chat-alert" class="alert d-none" role="alert"></div>

  <div class="chat-wrapper">

    <!-- Header -->
    <div class="chat-header">
      <a href="messaggi.html" class="btn btn-sm btn-outline-secondary me-1">
        <i class="bi bi-arrow-left"></i>
      </a>
      <div class="avatar" id="header-avatar">?</div>
      <div>
        <div class="fw-bold" id="header-name">Caricamento...</div>
        <div class="text-muted small" id="header-sub"></div>
      </div>
    </div>

    <!-- Area messaggi -->
    <div id="messages-area">
      <div class="text-center py-4">
        <div class="spinner-border spinner-border-sm text-success" role="status"></div>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-bar">
      <textarea
        id="msg-input"
        rows="1"
        placeholder="Scrivi un messaggio..."
        aria-label="Messaggio"
      ></textarea>
      <button id="send-btn" disabled aria-label="Invia">
        <i class="bi bi-send-fill"></i>
      </button>
    </div>

  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/chat.js" defer></script>
</body>
</html>
