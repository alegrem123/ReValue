<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code scambio — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
    crossorigin="anonymous"
  />
  <style>
#qr-canvas {
      max-width: 280px;
      width: 100%;
      height: auto;
      display: block;
    }

    .qr-wrapper {
      background: #fff;
      border: 3px solid var(--rv-green);
      border-radius: 16px;
      padding: 24px;
      display: inline-flex;
      justify-content: center;
      max-width: 100%;
    }

    @media (max-width: 575.98px) {
      .qr-wrapper { padding: 16px; width: 100%; }
      #qr-canvas  { max-width: 100%; }
    }

    .countdown {
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5">
    <div id="qr-alert" class="alert d-none" role="alert"></div>

    <section class="page-hero">
      <p class="page-hero-eyebrow">Conferma scambio</p>
      <h1 class="h3 fw-bold mb-1">Mostra questo QR all'acquirente</h1>
      <p class="text-muted mb-0">L'acquirente lo scansiona per certificare il ritiro fisico.</p>
    </section>

    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5 text-center">

        <!-- Spinner durante generazione -->
        <div id="qr-loading" class="py-5">
          <div class="spinner-border text-success" role="status">
            <span class="visually-hidden">Generazione QR...</span>
          </div>
          <p class="mt-3 text-muted">Generazione QR in corso...</p>
        </div>

        <!-- QR generato -->
        <div id="qr-content" class="d-none">
          <div class="qr-wrapper mb-4">
            <canvas id="qr-canvas"></canvas>
            <img id="qr-fallback-img" class="d-none" alt="QR Code scambio" width="280" height="280" />
          </div>

          <div class="card border-0 shadow-sm p-3 mb-3">
            <p class="mb-1 text-muted small">Codice QR</p>
            <p class="fw-semibold font-monospace small text-break mb-0" id="qr-code-text">—</p>
          </div>

          <div class="card border-0 shadow-sm p-3 mb-3">
            <p class="mb-1 text-muted small">Annuncio</p>
            <p class="fw-bold mb-0" id="qr-annuncio-title">—</p>
          </div>

          <div class="card border-0 shadow-sm p-3 mb-4">
            <p class="mb-1 text-muted small">Scadenza QR</p>
            <p class="countdown fw-semibold text-danger mb-0" id="qr-countdown">—</p>
          </div>

          <button id="btn-rigenera" class="btn btn-outline-success w-100 mb-3">
            <i class="bi bi-arrow-clockwise me-2"></i>Rigenera QR
          </button>
          <a href="mybookings.html" class="btn btn-outline-secondary w-100">
            <i class="bi bi-arrow-left me-2"></i>Torna alle prenotazioni
          </a>
        </div>

      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"
    crossorigin="anonymous"></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/qr-display.js" defer></script>
<!-- impeccable-live-start -->
<script src="http://localhost:8400/live.js"></script>
<!-- impeccable-live-end -->
</body>
</html>
