<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crea annuncio — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQvO1Qbzt1z3VgOcYFhH4p+R1M1pR1Y="
    crossorigin=""
  />
  <style>
    .photo-preview { aspect-ratio: 1; object-fit: cover; width: 100%; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5" style="max-width: 980px;">
    <section class="page-hero">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-start">
        <div>
          <p class="page-hero-eyebrow">Nuovo annuncio</p>
          <h1 class="h3 fw-bold mb-2">Pubblica un oggetto da recuperare</h1>
          <p class="mb-0" style="opacity:0.8">Inserisci le informazioni principali e la scadenza del conferimento.</p>
        </div>
        <a href="catalog.html" class="btn btn-outline-light">Catalogo</a>
      </div>
    </section>

    <div id="create-annuncio-alert" class="alert d-none" role="alert"></div>

    <form id="create-annuncio-form" class="card p-4">
      <div class="row g-4">
        <div class="col-lg-7">
          <h2 class="h5 fw-bold mb-3">Dettagli oggetto</h2>
          <div class="mb-3">
            <label for="annuncio-title" class="form-label">Titolo</label>
            <input id="annuncio-title" name="titolo" type="text" class="form-control" maxlength="120" required />
          </div>
          <div class="mb-3">
            <label for="annuncio-description" class="form-label">Descrizione</label>
            <textarea id="annuncio-description" name="descrizione" class="form-control" rows="5" required></textarea>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="annuncio-category" class="form-label">Categoria</label>
              <select id="annuncio-category" name="categoria" class="form-select" required>
                <option value="" selected disabled>Seleziona categoria</option>
                <option value="Arredo e mobili">Arredo e mobili</option>
                <option value="Bagno e sanitari">Bagno e sanitari</option>
                <option value="Biciclette e mobilita">Biciclette e mobilita</option>
                <option value="Cancelleria">Cancelleria</option>
                <option value="Cucina e casalinghi">Cucina e casalinghi</option>
                <option value="Decorazioni">Decorazioni</option>
                <option value="Edilizia leggera">Edilizia leggera</option>
                <option value="Elettrodomestici">Elettrodomestici</option>
                <option value="Elettronica">Elettronica</option>
                <option value="Ferramenta">Ferramenta</option>
                <option value="Giardino e outdoor">Giardino e outdoor</option>
                <option value="Giocattoli">Giocattoli</option>
                <option value="Illuminazione">Illuminazione</option>
                <option value="Infanzia">Infanzia</option>
                <option value="Libri e manuali">Libri e manuali</option>
                <option value="Materiale scolastico">Materiale scolastico</option>
                <option value="Musica e strumenti">Musica e strumenti</option>
                <option value="Ricambi auto e moto">Ricambi auto e moto</option>
                <option value="Sport e tempo libero">Sport e tempo libero</option>
                <option value="Tessili e biancheria">Tessili e biancheria</option>
                <option value="Utensili e attrezzi">Utensili e attrezzi</option>
                <option value="Vasi e contenitori">Vasi e contenitori</option>
                <option value="Altro">Altro</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="annuncio-material" class="form-label">Materiale</label>
              <select id="annuncio-material" name="materiale" class="form-select">
                <option value="" selected>Seleziona materiale</option>
                <option value="Legno">Legno</option>
                <option value="Legno massello">Legno massello</option>
                <option value="Truciolare">Truciolare</option>
                <option value="MDF">MDF</option>
                <option value="Metallo">Metallo</option>
                <option value="Acciaio">Acciaio</option>
                <option value="Alluminio">Alluminio</option>
                <option value="Ferro">Ferro</option>
                <option value="Plastica">Plastica</option>
                <option value="PVC">PVC</option>
                <option value="Vetro">Vetro</option>
                <option value="Ceramica">Ceramica</option>
                <option value="Tessuto">Tessuto</option>
                <option value="Cotone">Cotone</option>
                <option value="Lana">Lana</option>
                <option value="Pelle">Pelle</option>
                <option value="Carta">Carta</option>
                <option value="Cartone">Cartone</option>
                <option value="Gomma">Gomma</option>
                <option value="Rame">Rame</option>
                <option value="Ottone">Ottone</option>
                <option value="Misto">Misto</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="annuncio-size" class="form-label">Dimensione</label>
              <select id="annuncio-size" name="dimensioni" class="form-select">
                <option value="piccolo">Piccolo</option>
                <option value="medio">Medio</option>
                <option value="grande">Grande</option>
                <option value="molto grande">Molto grande</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="annuncio-deadline" class="form-label">Scadenza</label>
              <input id="annuncio-deadline" name="dataScadenza" type="datetime-local" class="form-control" required />
            </div>
          </div>
        </div>

        <aside class="col-lg-5">
          <h2 class="h5 fw-bold mb-3">Posizione e foto</h2>
          <div class="row g-3">
            <div class="col-md-6 col-lg-12">
              <label for="annuncio-paese" class="form-label">Stato / Paese</label>
              <select id="annuncio-paese" name="paese" class="form-select" required>
                <option value="Italia" selected>Italia</option>
                <option value="San Marino">San Marino</option>
                <option value="Citta del Vaticano">Citta del Vaticano</option>
                <option value="Svizzera">Svizzera</option>
                <option value="Austria">Austria</option>
                <option value="Francia">Francia</option>
                <option value="Slovenia">Slovenia</option>
                <option value="Croazia">Croazia</option>
                <option value="Germania">Germania</option>
              </select>
            </div>
            <div class="col-md-6 col-lg-12">
              <label for="annuncio-regione" class="form-label">Regione</label>
              <select id="annuncio-regione" name="regione" class="form-select" required>
                <option value="" selected disabled>Seleziona regione</option>
                <option value="Abruzzo">Abruzzo</option>
                <option value="Basilicata">Basilicata</option>
                <option value="Calabria">Calabria</option>
                <option value="Campania">Campania</option>
                <option value="Emilia-Romagna">Emilia-Romagna</option>
                <option value="Friuli-Venezia Giulia">Friuli-Venezia Giulia</option>
                <option value="Lazio">Lazio</option>
                <option value="Liguria">Liguria</option>
                <option value="Lombardia">Lombardia</option>
                <option value="Marche">Marche</option>
                <option value="Molise">Molise</option>
                <option value="Piemonte">Piemonte</option>
                <option value="Puglia">Puglia</option>
                <option value="Sardegna">Sardegna</option>
                <option value="Sicilia">Sicilia</option>
                <option value="Toscana">Toscana</option>
                <option value="Trentino-Alto Adige/Südtirol">Trentino-Alto Adige/Südtirol</option>
                <option value="Umbria">Umbria</option>
                <option value="Valle d'Aosta/Vallée d'Aoste">Valle d'Aosta/Vallée d'Aoste</option>
                <option value="Veneto">Veneto</option>
              </select>
            </div>
            <div class="col-md-6 col-lg-12">
              <label for="annuncio-provincia" class="form-label">Provincia</label>
              <select id="annuncio-provincia" name="provincia" class="form-select" required>
                <option value="" selected disabled>Seleziona provincia</option>
                <option value="Trento">Trento</option>
                <option value="Bolzano/Bozen">Bolzano/Bozen</option>
                <option value="Verona">Verona</option>
                <option value="Brescia">Brescia</option>
              </select>
            </div>
            <div class="col-md-6 col-lg-12">
              <label for="annuncio-comune" class="form-label">Comune</label>
              <select id="annuncio-comune" name="comune" class="form-select" required>
                <option value="" selected disabled>Seleziona comune</option>
                <option value="Trento">Trento</option>
                <option value="Rovereto">Rovereto</option>
                <option value="Pergine Valsugana">Pergine Valsugana</option>
                <option value="Riva del Garda">Riva del Garda</option>
                <option value="Arco">Arco</option>
              </select>
            </div>
            <div class="col-md-6 col-lg-12">
              <label for="annuncio-via" class="form-label">Via</label>
              <input id="annuncio-via" name="via" type="text" class="form-control" placeholder="Es. Via Verdi 10" required />
            </div>
            <div class="col-12">
              <button id="use-location-btn" type="button" class="btn btn-outline-success w-100">
                <i class="bi bi-geo-alt"></i>
                Usa posizione attuale
              </button>
            </div>
            <div class="col-12">
              <label for="annuncio-location-map" class="form-label">Seleziona sulla mappa</label>
              <div id="annuncio-location-map" class="location-map rounded-3 overflow-hidden"></div>
              <div class="form-text">La preview usa l'indirizzo. Puoi cliccare sulla mappa per correggere il pin.</div>
              <input id="annuncio-lat" name="latitudine" type="hidden" />
              <input id="annuncio-lng" name="longitudine" type="hidden" />
              <input id="annuncio-city-lat" name="latitudineComune" type="hidden" />
              <input id="annuncio-city-lng" name="longitudineComune" type="hidden" />
            </div>
            <div class="col-12">
              <label for="annuncio-photos" class="form-label">Foto</label>
              <input id="annuncio-photos" name="foto" type="file" class="form-control" accept="image/*" multiple />
              <div class="form-text">Massimo 5 immagini. Verranno inviate in base64.</div>
            </div>
          </div>
          <div id="photo-preview-grid" class="row g-2 mt-2"></div>
        </aside>
      </div>

      <hr class="my-4" />

      <div class="d-flex flex-column flex-md-row justify-content-end gap-2">
        <a href="catalog.html" class="btn btn-outline-secondary">Annulla</a>
        <button id="create-annuncio-submit" type="submit" class="btn btn-success">
          Pubblica annuncio
        </button>
      </div>

      <datalist id="categorie-list">
        <option value="Arredo e mobili"></option>
        <option value="Elettronica"></option>
        <option value="Elettrodomestici"></option>
        <option value="Giardino e outdoor"></option>
        <option value="Utensili e attrezzi"></option>
        <option value="Altro"></option>
      </datalist>
      <datalist id="materiali-list">
        <option value="Legno"></option>
        <option value="Metallo"></option>
        <option value="Plastica"></option>
        <option value="Vetro"></option>
        <option value="Misto"></option>
      </datalist>
      <datalist id="regioni-list">
        <option value="Trentino-Alto Adige/Südtirol"></option>
        <option value="Veneto"></option>
        <option value="Lombardia"></option>
      </datalist>
      <datalist id="province-list">
        <option value="Trento"></option>
        <option value="Bolzano/Bozen"></option>
        <option value="Verona"></option>
        <option value="Brescia"></option>
      </datalist>
      <datalist id="comuni-list">
        <option value="Trento"></option>
        <option value="Rovereto"></option>
        <option value="Pergine Valsugana"></option>
        <option value="Riva del Garda"></option>
        <option value="Arco"></option>
      </datalist>
    </form>
  </main>

  <div id="footer-container"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/locationPicker.js" defer></script>
  <script src="../js/createAnnuncio.js" defer></script>
<!-- impeccable-live-start -->
<script src="http://localhost:8400/live.js"></script>
<!-- impeccable-live-end -->
</body>
</html>
