<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crea annuncio — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    crossorigin="anonymous"
  />
  <style>
    :root {
      --rv-green: #2E7D32;
      --rv-green-dark: #1B5E20;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #f8f9fa;
    }

    .form-header {
      border-left: 4px solid var(--rv-green);
    }

    .photo-preview {
      aspect-ratio: 1;
      object-fit: cover;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5" style="max-width: 980px;">
    <section class="bg-white rounded-4 p-4 shadow-sm mb-4 form-header">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-start">
        <div>
          <p class="text-uppercase small text-success mb-2">Nuovo annuncio</p>
          <h1 class="h3 fw-bold mb-2">Pubblica un oggetto da recuperare</h1>
          <p class="text-muted mb-0">Inserisci le informazioni principali e la scadenza del conferimento.</p>
        </div>
        <a href="/views/catalog.html" class="btn btn-outline-success">Catalogo</a>
      </div>
    </section>

    <div id="create-annuncio-alert" class="alert d-none" role="alert"></div>

    <form id="create-annuncio-form" class="bg-white rounded-4 p-4 shadow-sm">
      <div class="row g-4">
        <div class="col-lg-7">
          <h2 class="h5 fw-bold mb-3">Dettagli oggetto</h2>
          <div class="mb-3">
            <label for="annuncio-title" class="form-label">Titolo</label>
            <input id="annuncio-title" name="titolo" type="text" class="form-control" maxlength="120" required />
          </div>
          <div class="mb-3">
            <label for="annuncio-description" class="form-label">Descrizione</label>
            <textarea id="annuncio-description" name="descrizione" class="form-control" rows="5" required></textarea>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="annuncio-category" class="form-label">Categoria</label>
              <input id="annuncio-category" name="categoria" type="text" class="form-control" placeholder="Es. Mobili" required />
            </div>
            <div class="col-md-6">
              <label for="annuncio-material" class="form-label">Materiale</label>
              <input id="annuncio-material" name="materiale" type="text" class="form-control" placeholder="Es. Legno" />
            </div>
            <div class="col-md-6">
              <label for="annuncio-size" class="form-label">Dimensione</label>
              <select id="annuncio-size" name="dimensioni" class="form-select">
                <option value="piccolo">Piccolo</option>
                <option value="medio">Medio</option>
                <option value="grande">Grande</option>
                <option value="molto grande">Molto grande</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="annuncio-deadline" class="form-label">Scadenza</label>
              <input id="annuncio-deadline" name="dataScadenza" type="datetime-local" class="form-control" required />
            </div>
          </div>
        </div>

        <aside class="col-lg-5">
          <h2 class="h5 fw-bold mb-3">Posizione e foto</h2>
          <div class="row g-3">
            <div class="col-md-6 col-lg-12">
              <label for="annuncio-lat" class="form-label">Latitudine</label>
              <input id="annuncio-lat" name="latitudine" type="number" step="any" class="form-control" placeholder="46.0667" />
            </div>
            <div class="col-md-6 col-lg-12">
              <label for="annuncio-lng" class="form-label">Longitudine</label>
              <input id="annuncio-lng" name="longitudine" type="number" step="any" class="form-control" placeholder="11.1211" />
            </div>
            <div class="col-12">
              <button id="use-location-btn" type="button" class="btn btn-outline-success w-100">
                <i class="bi bi-geo-alt"></i>
                Usa posizione attuale
              </button>
            </div>
            <div class="col-12">
              <label for="annuncio-photos" class="form-label">Foto</label>
              <input id="annuncio-photos" name="foto" type="file" class="form-control" accept="image/*" multiple />
              <div class="form-text">Massimo 5 immagini. Verranno inviate in base64.</div>
            </div>
          </div>
          <div id="photo-preview-grid" class="row g-2 mt-2"></div>
        </aside>
      </div>

      <hr class="my-4" />

      <div class="d-flex flex-column flex-md-row justify-content-end gap-2">
        <a href="/views/catalog.html" class="btn btn-outline-secondary">Annulla</a>
        <button id="create-annuncio-submit" type="submit" class="btn btn-success">
          Pubblica annuncio
        </button>
      </div>
    </form>
  </main>

  <div id="footer-container"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="/js/layout.js" defer></script>
  <script src="/js/apiClient.js" defer></script>
  <script src="/js/createAnnuncio.js" defer></script>
</body>
</html>
