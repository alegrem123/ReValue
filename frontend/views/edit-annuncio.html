<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modifica annuncio - RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQvO1Qbzt1z3VgOcYFhH4p+R1M1pR1Y="
    crossorigin=""
  />
  <style>
    :root {
      --rv-green: #2E7D32;
      --rv-green-dark: #1B5E20;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #f8f9fa;
    }

    .form-header {
      border-left: 4px solid var(--rv-green);
    }

    .photo-preview {
      aspect-ratio: 1;
      object-fit: cover;
      width: 100%;
    }

    .location-map {
      min-height: 260px;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5" style="max-width: 980px;">
    <section class="bg-white rounded-4 p-4 shadow-sm mb-4 form-header">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-start">
        <div>
          <p class="text-uppercase small text-success mb-2">Modifica annuncio</p>
          <h1 class="h3 fw-bold mb-2">Aggiorna i dettagli dell'oggetto</h1>
          <p class="text-muted mb-0">Puoi modificare solo annunci ancora disponibili.</p>
        </div>
        <a href="my-annunci.html" class="btn btn-outline-success">I miei annunci</a>
      </div>
    </section>

    <div id="edit-annuncio-alert" class="alert d-none" role="alert"></div>

    <form id="edit-annuncio-form" class="bg-white rounded-4 p-4 shadow-sm d-none">
      <input id="edit-annuncio-id" type="hidden" />
      <div class="row g-4">
        <div class="col-lg-7">
          <h2 class="h5 fw-bold mb-3">Dettagli oggetto</h2>
          <div class="mb-3">
            <label for="annuncio-title" class="form-label">Titolo</label>
            <input id="annuncio-title" name="titolo" type="text" class="form-control" maxlength="120" required />
          </div>
          <div class="mb-3">
            <label for="annuncio-description" class="form-label">Descrizione</label>
            <textarea id="annuncio-description" name="descrizione" class="form-control" rows="5" required></textarea>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="annuncio-category" class="form-label">Categoria</label>
              <input id="annuncio-category" name="categoria" type="text" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label for="annuncio-material" class="form-label">Materiale</label>
              <input id="annuncio-material" name="materiale" type="text" class="form-control" />
            </div>
            <div class="col-md-6">
              <label for="annuncio-size" class="form-label">Dimensione</label>
              <select id="annuncio-size" name="dimensioni" class="form-select">
                <option value="piccolo">Piccolo</option>
                <option value="medio">Medio</option>
                <option value="grande">Grande</option>
                <option value="molto grande">Molto grande</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="annuncio-deadline" class="form-label">Scadenza</label>
              <input id="annuncio-deadline" name="dataScadenza" type="datetime-local" class="form-control" required />
            </div>
          </div>
        </div>

        <aside class="col-lg-5">
          <h2 class="h5 fw-bold mb-3">Posizione e foto</h2>
          <div class="row g-3">
            <div class="col-md-6 col-lg-12">
              <label for="annuncio-lat" class="form-label">Latitudine</label>
              <input id="annuncio-lat" name="latitudine" type="number" step="any" class="form-control" />
            </div>
            <div class="col-md-6 col-lg-12">
              <label for="annuncio-lng" class="form-label">Longitudine</label>
              <input id="annuncio-lng" name="longitudine" type="number" step="any" class="form-control" />
            </div>
            <div class="col-12">
              <label for="annuncio-location-map" class="form-label">Seleziona sulla mappa</label>
              <div id="annuncio-location-map" class="location-map rounded-3 overflow-hidden"></div>
              <div class="form-text">Clicca sulla mappa per aggiornare latitudine e longitudine.</div>
            </div>
            <div class="col-12">
              <label for="annuncio-photos" class="form-label">Sostituisci foto</label>
              <input id="annuncio-photos" name="foto" type="file" class="form-control" accept="image/*" multiple />
              <div class="form-text">Lascia vuoto per mantenere le foto esistenti. Massimo 5 immagini.</div>
            </div>
          </div>
          <div id="photo-preview-grid" class="row g-2 mt-2"></div>
        </aside>
      </div>

      <hr class="my-4" />

      <div class="d-flex flex-column flex-md-row justify-content-end gap-2">
        <a href="my-annunci.html" class="btn btn-outline-secondary">Annulla</a>
        <button id="edit-annuncio-submit" type="submit" class="btn btn-success">
          Salva modifiche
        </button>
      </div>
    </form>
  </main>

  <div id="footer-container"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/locationPicker.js" defer></script>
  <script src="../js/editAnnuncio.js" defer></script>
</body>
</html>
