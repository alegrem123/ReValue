<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifiche — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    crossorigin="anonymous"
  />
  <style>
    .notifica-card {
      transition: box-shadow 0.15s ease;
    }
    .notifica-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
    }
    .notifica-card.non-letta {
      border-left: 4px solid var(--rv-green, #2E7D32);
    }
    .notifica-card.letta {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5">
    <div id="notifiche-alert" class="alert d-none" role="alert"></div>

    <section class="page-hero">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-start">
        <div>
          <p class="page-hero-eyebrow">Il mio account</p>
          <h1 class="h3 fw-bold mb-0">Notifiche</h1>
        </div>
        <button class="btn btn-outline-light btn-sm" id="btn-leggi-tutte">
          <i class="bi bi-check2-all me-1"></i>Segna tutte come lette
        </button>
      </div>
    </section>

    <div id="notifiche-list" class="mt-4">
      <div class="text-center py-5">
        <div class="spinner-border text-success" role="status">
          <span class="visually-hidden">Caricamento...</span>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/notifiche.js" defer></script>
</body>
</html>
