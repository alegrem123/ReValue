<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scambio completato — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    crossorigin="anonymous"
  />
  <style>
.success-icon {
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, var(--rv-green-light), var(--rv-green-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .credits-badge {
      background: linear-gradient(135deg, var(--rv-accent), #FF8F00);
      color: #1a1a1a;
      font-size: 2rem;
      font-weight: 800;
      border-radius: 16px;
      padding: 1rem 2rem;
      display: inline-block;
    }

    .credits-label {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5 text-center">

        <div class="success-icon">
          <i class="bi bi-check-lg text-white" style="font-size: 2.8rem;"></i>
        </div>

        <h1 class="h2 fw-bold mb-2">Scambio completato!</h1>
        <p class="text-muted mb-5">Il ritiro è stato certificato con successo. Grazie per aver contribuito all'economia circolare.</p>

        <div class="card border-0 shadow-sm p-4 mb-4">
          <p class="credits-label mb-2">Crediti accreditati</p>
          <div class="credits-badge mb-2" id="crediti-value">—</div>
          <p class="text-muted small mb-0">I crediti sono stati aggiunti al tuo wallet.</p>
        </div>

        <div class="d-grid gap-2">
          <a href="mybookings.html" class="btn btn-success btn-lg">
            <i class="bi bi-list-check me-2"></i>Le mie prenotazioni
          </a>
          <a href="catalog.html" class="btn btn-outline-success">
            <i class="bi bi-grid me-2"></i>Esplora altri annunci
          </a>
          <a href="wallethistory.html" class="btn btn-outline-secondary">
            <i class="bi bi-wallet2 me-2"></i>Vedi wallet
          </a>
        </div>

      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/swap-success.js" defer></script>
</body>
</html>
