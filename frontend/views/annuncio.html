<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Annuncio — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHviAXMgRXELFdQERoMKGGEkODfC3X5"
    crossorigin="anonymous"
  />
  <style>
    :root {
      --rv-green:       #2E7D32;
      --rv-green-light: #43A047;
      --rv-green-dark:  #1B5E20;
      --rv-accent:      #FFC107;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #f8f9fa;
    }

    .annuncio-header {
      border-left: 4px solid var(--rv-green);
    }

    .annuncio-meta dt {
      width: 160px;
    }

    .annuncio-meta dd {
      margin-left: 0;
    }

    .img-preview {
      max-height: 420px;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5">
    <div id="annuncio-alert" class="alert d-none" role="alert"></div>

    <section class="bg-white rounded-4 p-4 shadow-sm mb-4 annuncio-header">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-start">
        <div>
          <p class="text-uppercase small text-success mb-2">Dettaglio annuncio</p>
          <h1 id="annuncio-title" class="h3 fw-bold mb-2">Caricamento...</h1>
          <p id="annuncio-donatore" class="mb-0 text-muted"></p>
        </div>
        <div class="text-md-end">
          <a href="/views/catalog.html" class="btn btn-outline-success btn-sm">Torna al catalogo</a>
        </div>
      </div>
    </section>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card shadow-sm border-0 overflow-hidden">
          <img id="annuncio-image" src="https://via.placeholder.com/720x420?text=Nessuna+immagine" alt="Immagine annuncio" class="w-100 img-preview" />
          <div class="card-body">
            <p id="annuncio-description" class="mb-0 text-muted"></p>
          </div>
        </div>
      </div>
      <aside class="col-lg-6">
        <div class="card shadow-sm border-0 p-4">
          <div class="mb-4">
            <h2 class="h5 fw-bold mb-3">Informazioni</h2>
            <dl class="row annuncio-meta">
              <dt class="col-6 text-muted">Scadenza</dt>
              <dd class="col-6" id="annuncio-deadline"></dd>

              <dt class="col-6 text-muted">Categoria</dt>
              <dd class="col-6" id="annuncio-category"></dd>

              <dt class="col-6 text-muted">Materiale</dt>
              <dd class="col-6" id="annuncio-material"></dd>

              <dt class="col-6 text-muted">Dimensioni</dt>
              <dd class="col-6" id="annuncio-size"></dd>

              <dt class="col-6 text-muted">Crediti stimati</dt>
              <dd class="col-6" id="annuncio-value"></dd>

              <dt class="col-6 text-muted">Indirizzo</dt>
              <dd class="col-6" id="annuncio-location"></dd>
            </dl>
          </div>
          <div class="d-grid">
            <a id="annuncio-action" href="/views/catalog.html" class="btn btn-success btn-lg">Torna al catalogo</a>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <div id="footer-container"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmO7Qqxp4Fq/LRPF1lQBkUa/Ji"
    crossorigin="anonymous"
  ></script>
  <script src="/js/layout.js" defer></script>
  <script src="/js/apiClient.js" defer></script>
  <script src="/js/annuncio.js" defer></script>
</body>
</html>
