<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le mie segnalazioni — RE-VALUE</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    crossorigin="anonymous"
  />
  <style>
    .motivo-troncato {
      max-width: 320px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skeleton {
      border-radius: 6px;
      background: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 50%, #e9ecef 75%);
      background-size: 600px 100%;
      animation: shimmer 1.2s infinite;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-5" style="max-width: 960px;">
    <section class="page-hero mb-4">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-start">
        <div>
          <p class="page-hero-eyebrow">Area personale</p>
          <h1 class="h3 fw-bold mb-2">Le mie segnalazioni</h1>
          <p class="text-muted mb-0">Segnalazioni che hai inviato al team RE-VALUE.</p>
        </div>
        <a href="segnala.html" class="btn btn-outline-danger">
          <i class="bi bi-flag me-1"></i>Nuova segnalazione
        </a>
      </div>
    </section>

    <div id="reports-alert" class="alert d-none" role="alert"></div>

    <section class="bg-white rounded-4 shadow-sm overflow-hidden">
      <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
        <h2 class="h5 fw-bold mb-0">Segnalazioni inviate</h2>
        <button id="refresh-btn" type="button" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-clockwise me-1"></i>Aggiorna
        </button>
      </div>

      <!-- skeleton -->
      <div id="reports-skeleton" class="p-3 d-flex flex-column gap-3">
        <div class="skeleton" style="height:52px;"></div>
        <div class="skeleton" style="height:52px;"></div>
        <div class="skeleton" style="height:52px;"></div>
      </div>

      <!-- empty state -->
      <div id="reports-empty" class="text-center py-5 d-none">
        <i class="bi bi-flag fs-1 text-muted"></i>
        <p class="text-muted mt-3 mb-3">Non hai ancora inviato segnalazioni.</p>
      </div>

      <!-- table -->
      <div id="reports-table-wrap" class="d-none">
        <div class="table-responsive">
          <table class="table table-hover mb-0 align-middle">
            <thead class="table-light">
              <tr>
                <th>Tipo</th>
                <th>Motivo</th>
                <th>Utente segnalato</th>
                <th>Data</th>
                <th>Stato</th>
              </tr>
            </thead>
            <tbody id="reports-tbody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/apiClient.js" defer></script>
  <script src="../js/myReports.js" defer></script>
</body>
</html>
