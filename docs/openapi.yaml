openapi: 3.0.3
info:
  title: RE-VALUE API
  version: 1.1.0
  description: API REST del progetto RE-VALUE. Tutte le risposte JSON usano il formato `{ ok, data }` o `{ ok, error, message }`.
servers:
  - url: http://localhost:3000
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiSuccess:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          nullable: true
    ApiError:
      type: object
      required: [ok, error, message]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
        message:
          type: string
    AuthBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RegisterBody:
      allOf:
        - $ref: '#/components/schemas/AuthBody'
        - type: object
          required: [nome, cognome]
          properties:
            nome:
              type: string
            cognome:
              type: string
    AnnuncioBody:
      type: object
      required: [titolo, dataScadenza, oggetto]
      properties:
        titolo:
          type: string
        dataScadenza:
          type: string
          format: date-time
        latitudine:
          type: number
        longitudine:
          type: number
        oggetto:
          type: object
          required: [categoria, descrizione]
          properties:
            categoria:
              type: string
            descrizione:
              type: string
            dimensioni:
              type: string
            materiale:
              type: string
            foto:
              type: array
              maxItems: 5
              items:
                type: string
    RecensioneBody:
      type: object
      required: [prenotazioneId, positiva]
      properties:
        prenotazioneId:
          type: string
        positiva:
          type: boolean
        testo:
          type: string
    SegnalazioneBody:
      type: object
      required: [motivo]
      properties:
        segnalatoId:
          type: string
        annuncioId:
          type: string
        tipo:
          type: string
          enum: [descrizione, inappropriato, altro]
        motivo:
          type: string
    ForceAnnuncioStatoBody:
      type: object
      required: [stato]
      properties:
        stato:
          type: string
          enum: [DISPONIBILE, SCADUTO, RITIRATO]
paths:
  /api/v1/auth/register:
    post:
      security: []
      summary: Registra un utente e crea il wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBody'
      responses:
        '201':
          description: Utente registrato
  /api/v1/auth/login:
    post:
      security: []
      summary: Autentica un utente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthBody'
      responses:
        '200':
          description: JWT e profilo utente
  /api/v1/users/me:
    get:
      summary: Profilo dell'utente autenticato
      responses:
        '200':
          description: Profilo personale
    put:
      summary: Aggiorna profilo personale
      responses:
        '200':
          description: Profilo aggiornato
  /api/v1/users/{id}/profilo:
    get:
      security: []
      summary: Profilo pubblico con riepilogo recensioni
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profilo pubblico
  /api/v1/annunci:
    get:
      security: []
      summary: Catalogo pubblico annunci con filtri
      parameters:
        - in: query
          name: categoria
          schema:
            type: string
        - in: query
          name: materiale
          schema:
            type: string
        - in: query
          name: dimensione
          schema:
            type: string
        - in: query
          name: raggio
          schema:
            type: number
      responses:
        '200':
          description: Lista annunci
    post:
      summary: Crea annuncio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnuncioBody'
      responses:
        '201':
          description: Annuncio creato
  /api/v1/annunci/me:
    get:
      summary: Annunci dell'utente autenticato
      responses:
        '200':
          description: Lista annunci personali
  /api/v1/annunci/{id}:
    get:
      security: []
      summary: Dettaglio annuncio
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Annuncio
    put:
      summary: Modifica annuncio disponibile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Annuncio aggiornato
    delete:
      summary: Cancella logicamente annuncio disponibile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Annuncio rimosso
  /api/v1/prenotazioni:
    post:
      summary: Prenota un annuncio disponibile
      responses:
        '201':
          description: Prenotazione creata
  /api/v1/prenotazioni/me:
    get:
      summary: Prenotazioni dell'utente autenticato
      responses:
        '200':
          description: Lista prenotazioni
  /api/v1/prenotazioni/{id}:
    get:
      summary: Dettaglio prenotazione
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Prenotazione
    delete:
      summary: Annulla prenotazione entro 15 minuti
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Prenotazione annullata
  /api/v1/prenotazioni/{id}/no-show:
    post:
      summary: Segnala mancato ritiro
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Mancato ritiro registrato
  /api/v1/prenotazioni/{id}/disdici:
    post:
      summary: Disdice il ritiro lato donatore
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ritiro disdetto
  /api/v1/qr/genera:
    post:
      summary: Genera QR ufficiale per prenotazione
      responses:
        '201':
          description: Token QR
  /api/v1/qr/valida:
    post:
      summary: Valida QR ufficiale e completa lo scambio
      responses:
        '200':
          description: Scambio completato
  /api/v1/wallet/me:
    get:
      summary: Saldo e storico wallet
      responses:
        '200':
          description: Wallet
  /api/v1/wallet/saldo:
    get:
      summary: Solo saldo wallet
      responses:
        '200':
          description: Saldo
  /api/v1/wallet/storico:
    get:
      summary: Storico wallet paginato
      responses:
        '200':
          description: Storico
  /api/v1/conversazioni/me:
    get:
      summary: Conversazioni dell'utente
      responses:
        '200':
          description: Lista conversazioni
  /api/v1/conversazioni/{id}/messaggi:
    get:
      summary: Storico messaggi
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Messaggi
    post:
      summary: Invia messaggio
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Messaggio inviato
  /api/v1/recensioni:
    post:
      summary: Lascia una recensione dopo uno scambio completato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecensioneBody'
      responses:
        '201':
          description: Recensione creata
  /api/v1/segnalazioni:
    post:
      summary: Segnala un utente o un annuncio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SegnalazioneBody'
      responses:
        '201':
          description: Segnalazione creata
  /api/v1/admin/statistiche:
    get:
      summary: Statistiche admin
      responses:
        '200':
          description: Statistiche aggregate
  /api/v1/admin/users:
    get:
      summary: Lista utenti per dashboard admin
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista utenti paginata
  /api/v1/admin/annunci:
    get:
      summary: Lista annunci per dashboard admin
      parameters:
        - in: query
          name: stato
          schema:
            type: string
            enum: [DISPONIBILE, PRENOTATO, RITIRATO, SCADUTO]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista annunci paginata
  /api/v1/admin/segnalazioni:
    get:
      summary: Lista segnalazioni admin
      responses:
        '200':
          description: Segnalazioni
  /api/v1/admin/segnalazioni/{id}/malus:
    post:
      summary: Applica un malus all'utente segnalato
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Malus applicato
        '409':
          description: Malus gia applicato
  /api/v1/admin/utenti/{id}/ban:
    post:
      summary: Banna utente
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Utente bannato
  /api/v1/admin/annunci/{id}/forza:
    patch:
      summary: Forza lo stato di un annuncio
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForceAnnuncioStatoBody'
      responses:
        '200':
          description: Stato annuncio aggiornato
  /api/v1/admin/annunci/{id}:
    delete:
      summary: Rimuove logicamente un annuncio
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Annuncio rimosso
  /api/v1/scambi/{prenotazioneId}/qr:
    get:
      deprecated: true
      summary: Endpoint legacy sostituito da /api/v1/qr/genera
      parameters:
        - in: path
          name: prenotazioneId
          required: true
          schema:
            type: string
      responses:
        '410':
          description: Endpoint legacy deprecato
  /api/v1/scambi/{prenotazioneId}/valida:
    post:
      deprecated: true
      summary: Endpoint legacy sostituito da /api/v1/qr/valida
      parameters:
        - in: path
          name: prenotazioneId
          required: true
          schema:
            type: string
      responses:
        '410':
          description: Endpoint legacy deprecato
